<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveSense AI Result</title>

<style>
:root{
    --bg:#07111f;
    --panel:#0f1b2b;
    --panel-soft:#132238;
    --line:#2a405d;
    --text:#f8fafc;
    --muted:#a9c2e6;
    --primary:#20c8ff;
    --primary-strong:#2563eb;
    --danger:#ff4655;
    --success:#2ed56f;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',Arial,sans-serif;
}

.app{
    width:min(1320px,94vw);
    margin:0 auto;
    padding:28px 0 36px;
}

.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    margin-bottom:24px;
}

.brand,
.panel-title,
.action-link{
    display:flex;
    align-items:center;
    gap:12px;
}

.brand-mark{
    display:grid;
    width:46px;
    height:46px;
    place-items:center;
    background:linear-gradient(145deg,var(--primary),var(--primary-strong));
    border-radius:14px;
    box-shadow:0 14px 30px rgba(37,99,235,.28);
}

.brand h1{
    margin:0;
    font-size:28px;
    line-height:1.1;
}

.brand p{
    margin:4px 0 0;
    color:var(--muted);
    font-size:14px;
}

.action-link{
    min-height:44px;
    padding:0 16px;
    color:var(--text);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:11px;
    font-size:14px;
    font-weight:800;
    text-decoration:none;
}

.dashboard{
    display:grid;
    grid-template-columns:minmax(0,1.75fr) minmax(360px,.85fr);
    gap:24px;
}

.panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:0 24px 70px rgba(0,0,0,.25);
    overflow:hidden;
}

.panel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:18px 20px;
    border-bottom:1px solid var(--line);
}

.panel-title{
    margin:0;
    font-size:18px;
}

.status-pill{
    display:flex;
    align-items:center;
    gap:8px;
    color:#bfdbfe;
    background:rgba(56,189,248,.1);
    border:1px solid rgba(56,189,248,.24);
    border-radius:999px;
    padding:8px 12px;
    font-size:13px;
    font-weight:800;
}

.dot{
    width:8px;
    height:8px;
    background:var(--primary);
    border-radius:50%;
}

.video-wrap{
    padding:20px;
}

video{
    display:block;
    width:100%;
    aspect-ratio:16/9;
    background:#020617;
    border-radius:14px;
}

.analysis-panel{
    background:#0c1929;
    border-color:#28415f;
    padding-bottom:18px;
}

.steering-stage{
    display:grid;
    place-items:center;
    padding:26px 20px 12px;
}

.wheel{
    width:260px;
    height:260px;
    text-align:center;
    transition:transform .12s linear;
    transform-origin:center;
    will-change:transform;
    filter:drop-shadow(0 18px 28px rgba(0,0,0,.38));
}

.wheel img{
    display:block;
    width:100%;
    height:100%;
    object-fit:contain;
}

.angle-readout{
    margin-top:8px;
    text-align:center;
}

.angle{
    color:var(--primary);
    font-size:48px;
    font-weight:900;
    line-height:1;
}

.label{
    margin-top:7px;
    color:var(--muted);
    font-size:13px;
    font-weight:800;
    letter-spacing:.06em;
    text-transform:uppercase;
}

.telemetry-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:0 18px;
}

.telemetry-card,
.speedometer{
    background:var(--panel-soft);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
}

.telemetry-card{
    min-height:128px;
}

.telemetry-title{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    color:var(--muted);
    font-size:12px;
    font-weight:900;
    letter-spacing:.08em;
    text-align:center;
    text-transform:uppercase;
}

.gear-value{
    margin-top:14px;
    color:var(--text);
    font-size:52px;
    font-weight:900;
    line-height:1;
    text-align:center;
}

.brake-value{
    margin-top:12px;
    color:var(--danger);
    font-size:34px;
    font-weight:900;
    text-align:center;
}

.brake-track{
    height:10px;
    margin-top:14px;
    overflow:hidden;
    background:#3a4d67;
    border-radius:999px;
}

.brake-fill{
    width:0%;
    height:100%;
    background:var(--danger);
    border-radius:999px;
    transition:width .12s linear;
}

.brake-active{
    border-color:var(--danger);
    box-shadow:0 0 24px rgba(239,68,68,.24);
}

.speedometer{
    margin:12px 18px 0;
    padding:20px 18px 18px;
}

.speed-gauge{
    position:relative;
    width:260px;
    height:150px;
    margin:10px auto 0;
    overflow:hidden;
}

.speed-dial{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

.speed-track,
.speed-progress{
    fill:none;
    stroke-linecap:butt;
    stroke-width:14;
}

.speed-track{
    stroke:#31435d;
}

.speed-progress{
    stroke:var(--success);
    stroke-dasharray:0 100;
    transition:stroke-dasharray .12s linear;
}

.speed-needle{
    position:absolute;
    left:50%;
    bottom:30px;
    width:4px;
    height:86px;
    background:var(--text);
    border-radius:999px;
    transform:translateX(-50%) rotate(-90deg);
    transform-origin:50% 100%;
    transition:transform .12s linear;
}

.speed-needle::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:-9px;
    width:18px;
    height:18px;
    background:var(--text);
    border:4px solid var(--panel-soft);
    border-radius:50%;
    transform:translateX(-50%);
}

.speed-scale{
    display:flex;
    justify-content:space-between;
    width:252px;
    margin:-10px auto 0;
    color:#9dccff;
    font-size:12px;
    font-weight:800;
}

.speed-value{
    margin-top:14px;
    color:var(--success);
    font-size:38px;
    font-weight:900;
    text-align:center;
}

.speed-unit{
    color:var(--muted);
    font-size:14px;
    font-weight:700;
}

svg{
    width:20px;
    height:20px;
    stroke:currentColor;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
    fill:none;
}

@media (max-width:980px){
    .topbar{
        align-items:stretch;
        flex-direction:column;
    }

    .dashboard,
    .telemetry-grid{
        grid-template-columns:1fr;
    }

    .wheel{
        width:210px;
        height:210px;
    }

    .speed-gauge{
        width:230px;
    }
}
</style>
</head>

<body>
<div class="app">
    <header class="topbar">
        <div class="brand">
            <div class="brand-mark">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 17h14"></path>
                    <path d="M6 17l1.5-5h9L18 17"></path>
                    <path d="M8 12l2-4h4l2 4"></path>
                    <circle cx="7" cy="17" r="2"></circle>
                    <circle cx="17" cy="17" r="2"></circle>
                </svg>
            </div>
            <div>
                <h1>DriveSense AI</h1>
                <p>Road video intelligence dashboard</p>
            </div>
        </div>

        <a href="/" class="action-link">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 12H5"></path>
                <path d="M12 19l-7-7 7-7"></path>
            </svg>
            New Analysis
        </a>
    </header>

    <main class="dashboard">
        <section class="panel">
            <div class="panel-head">
                <h2 class="panel-title">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                        <path d="M10 9l5 3-5 3V9z"></path>
                    </svg>
                    Processed Footage
                </h2>

                <div class="status-pill">
                    <span class="dot"></span>
                    Synced telemetry
                </div>
            </div>

            <div class="video-wrap">
                <video id="drivingVideo" controls>
                    <source src="{{ video_path }}" type="video/mp4">
                </video>
            </div>
        </section>

        <aside class="panel analysis-panel">
            <div class="panel-head">
                <h2 class="panel-title">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 14l4-4"></path>
                        <path d="M3.34 19a10 10 0 1 1 17.32 0"></path>
                    </svg>
                    Drive Metrics
                </h2>
            </div>

            <div class="steering-stage">
                <div
                    id="steeringWheel"
                    class="wheel"
                    style="transform:rotate({{ angle * 90 if angle is number else 0 }}deg);"
                >
                    <img
                        src="{{ url_for('static', filename='images/steering-wheel.png') }}"
                        alt="Steering wheel"
                    >
                </div>

                <div class="angle-readout">
                    <div id="steeringAngle" class="angle">{{ angle }}</div>
                    <div class="label">Steering Angle</div>
                </div>
            </div>

            <div class="telemetry-grid">
                <div class="telemetry-card">
                    <div class="telemetry-title">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 3v6"></path>
                            <path d="M12 15v6"></path>
                            <path d="M3 12h6"></path>
                            <path d="M15 12h6"></path>
                        </svg>
                        Race Gear
                    </div>
                    <div id="gearValue" class="gear-value">N</div>
                </div>

                <div id="brakeBox" class="telemetry-card">
                    <div class="telemetry-title">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="9"></circle>
                            <path d="M8 8l8 8"></path>
                            <path d="M16 8l-8 8"></path>
                        </svg>
                        Brake
                    </div>
                    <div id="brakeValue" class="brake-value">0%</div>
                    <div class="brake-track">
                        <div id="brakeFill" class="brake-fill"></div>
                    </div>
                </div>
            </div>

            <div class="speedometer">
                <div class="telemetry-title">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 14l4-4"></path>
                        <path d="M3.34 19a10 10 0 1 1 17.32 0"></path>
                    </svg>
                    Speed
                </div>

                <div class="speed-gauge">
                    <svg class="speed-dial" viewBox="0 0 260 150" aria-hidden="true">
                        <path
                            class="speed-track"
                            d="M38 126 A92 92 0 0 1 222 126"
                            pathLength="100"
                        ></path>
                        <path
                            id="speedArcFill"
                            class="speed-progress"
                            d="M38 126 A92 92 0 0 1 222 126"
                            pathLength="100"
                        ></path>
                    </svg>
                    <div id="speedNeedle" class="speed-needle"></div>
                </div>

                <div class="speed-scale">
                    <span>0</span>
                    <span>60</span>
                    <span>120</span>
                </div>

                <div id="speedValue" class="speed-value">
                    0 <span class="speed-unit">km/h</span>
                </div>
            </div>
        </aside>
    </main>
</div>

<script>
const video = document.getElementById("drivingVideo");
const wheel = document.getElementById("steeringWheel");
const angleText = document.getElementById("steeringAngle");
const gearValue = document.getElementById("gearValue");
const brakeBox = document.getElementById("brakeBox");
const brakeValue = document.getElementById("brakeValue");
const brakeFill = document.getElementById("brakeFill");
const speedArcFill = document.getElementById("speedArcFill");
const speedNeedle = document.getElementById("speedNeedle");
const speedValue = document.getElementById("speedValue");

const angles = {{ angles | tojson }};
const fps = Number({{ fps | tojson }}) || 30;
const rotationScale = 90;

function clamp(value, min, max){
    return Math.min(max, Math.max(min, value));
}

function getCurrentFrameIndex(){
    if(!angles.length){
        return 0;
    }

    return Math.min(
        angles.length - 1,
        Math.max(0, Math.floor(video.currentTime * fps))
    );
}

function getAngleAtFrame(frameIndex){
    if(!angles.length){
        return 0;
    }

    return Number(angles[clamp(frameIndex, 0, angles.length - 1)]) || 0;
}

function getBrakeIntensity(frameIndex, angle){
    const previousAngle = getAngleAtFrame(frameIndex - 2);
    const nextAngle = getAngleAtFrame(frameIndex + 2);
    const steeringChange = Math.abs(nextAngle - previousAngle);
    const turnLoad = Math.abs(angle);

    return clamp((turnLoad * .75) + (steeringChange * 3.5) - .08, 0, 1);
}

function getGear(brakeIntensity){
    if(video.ended || video.paused || video.currentTime === 0){
        return "P";
    }

    if(brakeIntensity > .7){
        return "2";
    }

    if(!video.duration){
        return "1";
    }

    const progress = video.currentTime / video.duration;
    const baseGear = Math.floor(progress * 5) + 1;

    return String(clamp(baseGear, 1, 6));
}

function getEstimatedSpeed(brakeIntensity){
    if(video.paused || video.ended || video.currentTime === 0){
        return 0;
    }

    if(!video.duration){
        return 25;
    }

    const progress = video.currentTime / video.duration;
    const cruiseSpeed = 42 + Math.sin(progress * Math.PI) * 48;
    const brakingDrop = brakeIntensity * 38;

    return clamp(cruiseSpeed - brakingDrop, 0, 120);
}

function updateDriveTelemetry(frameIndex, angle){
    const brakeIntensity = getBrakeIntensity(frameIndex, angle);
    const brakePercent = Math.round(brakeIntensity * 100);
    const speed = getEstimatedSpeed(brakeIntensity);
    const needleRotation = -90 + (speed / 120) * 180;

    gearValue.textContent = getGear(brakeIntensity);
    brakeValue.textContent = `${brakePercent}%`;
    brakeFill.style.width = `${brakePercent}%`;
    brakeBox.classList.toggle("brake-active", brakeIntensity > .45);
    speedArcFill.style.strokeDasharray = `${(speed / 120) * 100} 100`;
    speedNeedle.style.transform = `translateX(-50%) rotate(${needleRotation}deg)`;
    speedValue.innerHTML = `${Math.round(speed)} <span class="speed-unit">km/h</span>`;
}

function updateSteering(){
    const frameIndex = getCurrentFrameIndex();
    const angle = getAngleAtFrame(frameIndex);

    wheel.style.transform = `rotate(${angle * rotationScale}deg)`;
    angleText.textContent = angle.toFixed(3);
    updateDriveTelemetry(frameIndex, angle);
}

video.addEventListener("loadedmetadata", updateSteering);
video.addEventListener("timeupdate", updateSteering);
video.addEventListener("seeking", updateSteering);
video.addEventListener("seeked", updateSteering);

let animationFrameId = null;

function animateSteering(){
    updateSteering();

    if(!video.paused && !video.ended){
        animationFrameId = requestAnimationFrame(animateSteering);
    }
}

video.addEventListener("play", function(){
    cancelAnimationFrame(animationFrameId);
    animateSteering();
});

video.addEventListener("pause", function(){
    cancelAnimationFrame(animationFrameId);
    updateSteering();
});

updateSteering();
</script>
</body>
</html>
